<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LazyMind</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      color: #eaeaea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      flex-direction: column;
      gap: 24px;
    }
    .logo { font-size: 48px; }
    .title { font-size: 24px; font-weight: 600; letter-spacing: 2px; }
    .status {
      font-size: 14px;
      color: #8888aa;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo">🧠</div>
  <div class="title">LazyMind</div>
  <div class="status">正在启动服务...</div>
</body>
</html>
